{% extends "base.html" %}
{% block title %}Admin Login{% endblock %}
{% block content %}

<!--
===================================
[!] SECURITY NOTICE - DEV ONLY [!]
The login query uses string formatting:
  SELECT id, username, password FROM users WHERE username = '{input}' AND password = '{input}'

This is vulnerable to SQL injection. The flags table contains the admin credentials.
Fix this before deployment!
===================================
-->

<div class="form-container">
    <h2><i class="fas fa-lock"></i> Admin <span>Login</span></h2>

    {% if error %}
    <div class="alert alert-error">
        <i class="fas fa-exclamation-circle"></i> {{ error }}
    </div>
    {% endif %}

    <p class="form-hint">Enter your admin credentials to access the dashboard.</p>

    <form method="POST" action="/admin">
        <div class="form-group">
            <label for="username"><i class="fas fa-user"></i> Username</label>
            <input type="text" id="username" name="username" placeholder="Enter admin username" required>
        </div>
        <div class="form-group">
            <label for="password"><i class="fas fa-key"></i> Password</label>
            <input type="password" id="password" name="password" placeholder="Enter admin password" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block"><i class="fas fa-sign-in-alt"></i> Sign In</button>
    </form>
</div>

{% endblock %}

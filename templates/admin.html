{% extends "base.html" %}
{% block title %}Admin Login{% endblock %}
{% block content %}

<div class="form-container">
    <h2><span class="material-symbols-rounded">lock</span> Admin <span>Login</span></h2>

    {% if error %}
    <div class="alert alert-error">
        <span class="material-symbols-rounded">error</span> {{ error }}
    </div>
    {% endif %}

    <p class="form-hint">Enter your admin credentials to access the dashboard.</p>

    <form method="POST" action="/admin">
        <div class="form-group">
            <label for="username"><span class="material-symbols-rounded">person</span> Username</label>
            <input type="text" id="username" name="username" placeholder="Enter admin username" required>
        </div>
        <div class="form-group">
            <label for="password"><span class="material-symbols-rounded">key</span> Password</label>
            <input type="password" id="password" name="password" placeholder="Enter admin password" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block"><span class="material-symbols-rounded">login</span> Sign In</button>
    </form>
</div>

{% endblock %}

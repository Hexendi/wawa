{% extends "base.html" %}
{% block title %}Admin Login{% endblock %}
{% block content %}

<div class="form-container">
    <h2><i class="ph ph-lock-simple"></i> Admin <span>Login</span></h2>

    {% if error %}
    <div class="alert alert-error">
        <i class="ph ph-warning-circle"></i> {{ error }}
    </div>
    {% endif %}

    <p class="form-hint">Enter your admin credentials to access the dashboard.</p>

    <form method="POST" action="/admin">
        <div class="form-group">
            <label for="username"><i class="ph ph-user"></i> Username</label>
            <input type="text" id="username" name="username" placeholder="Enter admin username" required>
        </div>
        <div class="form-group">
            <label for="password"><i class="ph ph-key"></i> Password</label>
            <input type="password" id="password" name="password" placeholder="Enter admin password" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block"><i class="ph ph-sign-in"></i> Sign In</button>
    </form>
</div>

{% endblock %}

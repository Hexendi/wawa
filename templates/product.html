{% extends "base.html" %}
{% block title %}{{ product.name }}{% endblock %}
{% block content %}

<div class="product-detail">
    <a href="/shop" class="back-link"><i data-lucide="arrow-left"></i> Back to Shop</a>
    <div class="product-detail-grid">
        <div class="product-detail-image">
            <img src="{{ product.image }}" alt="{{ product.name }}">
        </div>
        <div class="product-detail-info">
            <span class="product-badge"><i data-lucide="tag"></i> New Arrival</span>
            <h1>{{ product.name }}</h1>
            <div class="product-rating">
                <i data-lucide="star"></i><i data-lucide="star"></i><i data-lucide="star"></i><i data-lucide="star"></i><i data-lucide="star-half"></i>
                <span>(42 reviews)</span>
            </div>
            <p class="product-detail-price">${{ "%.2f"|format(product.price) }}</p>
            <p class="product-detail-desc">{{ product.description }}</p>
            <div class="product-actions">
                <form action="/purchase/{{ product.id }}" method="POST" style="display:inline;">
                    <button type="submit" class="btn btn-primary btn-lg"><i data-lucide="shopping-cart"></i> Buy Now</button>
                </form>
                <button class="btn btn-secondary btn-lg"><i data-lucide="heart"></i> Wishlist</button>
            </div>
            <div class="product-meta">
                <p><i data-lucide="check-circle" style="color: var(--success);"></i> In Stock</p>
                <p><i data-lucide="truck"></i> Free shipping on orders over $50</p>
                <p><i data-lucide="rotate-ccw"></i> 30-day easy returns</p>
            </div>
        </div>
    </div>
</div>

{% endblock %}

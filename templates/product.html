{% extends "base.html" %}
{% block title %}{{ product.name }}{% endblock %}
{% block content %}

<div class="product-detail">
    <a href="/shop" class="back-link"><i class="ph ph-arrow-left"></i> Back to Shop</a>
    <div class="product-detail-grid">
        <div class="product-detail-image">
            <img src="{{ product.image }}" alt="{{ product.name }}">
        </div>
        <div class="product-detail-info">
            <span class="product-badge"><i class="ph-fill ph-tag"></i> New Arrival</span>
            <h1>{{ product.name }}</h1>
            <div class="product-rating">
                <i class="ph-fill ph-star"></i>
                <i class="ph-fill ph-star"></i>
                <i class="ph-fill ph-star"></i>
                <i class="ph-fill ph-star"></i>
                <i class="ph ph-star-half"></i>
                <span>(42 reviews)</span>
            </div>
            <p class="product-detail-price">${{ "%.2f"|format(product.price) }}</p>
            <p class="product-detail-desc">{{ product.description }}</p>
            <div class="product-actions">
                <form action="/purchase/{{ product.id }}" method="POST" style="display:inline;">
                    <button type="submit" class="btn btn-primary btn-lg"><i class="ph ph-shopping-cart"></i> Buy Now</button>
                </form>
                <button class="btn btn-outline btn-lg"><i class="ph ph-heart"></i> Wishlist</button>
            </div>
            <div class="product-meta">
                <p><i class="ph-fill ph-check-circle" style="color: var(--success);"></i> In Stock</p>
                <p><i class="ph ph-truck"></i> Free shipping on orders over $50</p>
                <p><i class="ph ph-arrows-counter-clockwise"></i> 30-day easy returns</p>
            </div>
        </div>
    </div>
</div>

{% endblock %}

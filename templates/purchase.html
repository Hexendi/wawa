{% extends "base.html" %}
{% block title %}Purchase Confirmed{% endblock %}
{% block content %}

<div class="purchase-container">
    <div class="purchase-card">
        <div class="purchase-icon">
            <i class="ph-fill ph-check-circle"></i>
        </div>
        <h1>Purchase Confirmed!</h1>
        <p class="purchase-subtitle">Thank you for your order</p>

        <div class="purchase-details">
            <div class="purchase-field">
                <label>Order ID</label>
                <span>#{{ order_id }}</span>
            </div>
            <div class="purchase-field">
                <label>Product</label>
                <span>{{ product.name }}</span>
            </div>
            <div class="purchase-field">
                <label>Amount</label>
                <span>{{ "%.0f"|format(product.price) }} MRO</span>
            </div>
        </div>

        <div class="purchase-actions">
            <a href="/api/files?id=receipt_{{ product.id }}.txt" class="btn btn-primary btn-lg" download>
                <i class="ph ph-download-simple"></i> Download Receipt
            </a>
            <a href="/shop" class="btn btn-outline btn-lg">
                <i class="ph ph-bag"></i> Continue Shopping
            </a>
        </div>
    </div>
</div>

{% endblock %}

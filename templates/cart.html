{% extends "base.html" %}
{% block title %}Cart{% endblock %}
{% block content %}

<div class="page-header">
    <h1><span class="material-symbols-rounded">shopping_cart</span> Shopping Cart</h1>
    <p>Your cart is currently empty</p>
</div>

<div class="empty-cart">
    <span class="material-symbols-rounded">remove_shopping_cart</span>
    <h2>Your cart is empty</h2>
    <p>Looks like you haven't added any items yet.</p>
    <a href="/shop" class="btn btn-primary"><span class="material-symbols-rounded">shopping_bag</span> Start Shopping</a>
</div>

{% endblock %}
